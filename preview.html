<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex, nofollow">
<title>תצוגה מקדימה - Mytafrit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://uskwkqibrjmeocildgay.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Be+Vietnam+Pro:wght@400;500;700&family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
<style>
#previewBanner {
  position: sticky;
  top: 0;
  z-index: 9999;
  background: #fff7ed;
  border-bottom: 2px solid #fb923c;
  color: #92400e;
  padding: 12px 16px;
  text-align: center;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
#previewBanner button {
  background: #92400e;
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
#previewBanner button:hover {
  background: #78350f;
}
#previewLoading {
  text-align: center;
  padding: 80px 24px;
  font-family: 'Heebo', sans-serif;
}
#previewError {
  text-align: center;
  padding: 80px 24px;
  font-family: 'Heebo', sans-serif;
  display: none;
}
</style>
</head>
<body class="text-on-surface selection:bg-primary-fixed">

<div id="previewBanner">
  <span>👁️ תצוגה מקדימה — הלקוחות עדיין לא רואים את זה. כדי להציג להם, חזור לאדמין ולחץ "פרסם".</span>
  <button onclick="window.close()">סגור</button>
</div>

<div id="previewLoading">
  <p style="font-size:48px;margin-bottom:16px;">⏳</p>
  <p style="font-size:18px;color:#1c1c19;">טוען תצוגה מקדימה...</p>
</div>

<div id="previewError">
  <p style="font-size:48px;margin-bottom:16px;">⚠️</p>
  <h1 id="previewErrorTitle" style="font-size:24px;font-weight:800;color:#1c1c19;margin-bottom:8px;">שגיאה</h1>
  <p id="previewErrorMsg" style="font-size:15px;color:#6b7280;margin-bottom:24px;"></p>
  <button onclick="window.location.href='admin.html'" style="background:#92400e;color:white;border:none;padding:10px 24px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">חזרה לאדמין</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

async function loadPreview() {
  const { data: { session }, error: sessionError } = await supabase.auth.getSession();
  if (sessionError || !session || !session.user) {
    showError('לא מחובר', 'יש להתחבר תחילה כדי לראות תצוגה מקדימה.');
    setTimeout(() => { window.location.href = 'login.html'; }, 2500);
    return;
  }

  const userId = session.user.id;

  try {
    const [settingsRes, catsRes, prodsRes] = await Promise.all([
      supabase.from('settings').select('*').eq('user_id', userId).single(),
      supabase.from('categories').select('*').eq('user_id', userId).order('sort_order'),
      supabase.from('products').select('*').eq('user_id', userId).eq('is_active', true).order('sort_order'),
    ]);

    if (settingsRes.error || !settingsRes.data) {
      showError('לא נמצאו הגדרות', 'יש להגדיר את פרטי העסק באדמין תחילה.');
      return;
    }

    const payload = {
      version: 1,
      publishedAt: new Date().toISOString(),
      settings: settingsRes.data,
      categories: catsRes.data || [],
      products: prodsRes.data || [],
    };

    // Determine if there are unpublished changes
    const hasUnpublished = (() => {
      const s = settingsRes.data;
      if (!s.last_published_at) return true; // Never published
      if (!s.updated_at) return false;
      return new Date(s.updated_at) > new Date(s.last_published_at);
    })();

    // Update banner text accordingly
    const bannerSpan = document.querySelector('#previewBanner span');
    if (bannerSpan) {
      if (hasUnpublished) {
        bannerSpan.textContent = '👁️ תצוגה מקדימה — הלקוחות עדיין לא רואים את זה. כדי להציג להם, חזור לאדמין ולחץ "פרסם".';
      } else {
        bannerSpan.textContent = '👁️ תצוגה מקדימה — ככה הלקוחות רואים את התפריט שלך.';
      }
    }

    // Update banner color
    const banner = document.getElementById('previewBanner');
    if (banner) {
      if (hasUnpublished) {
        banner.style.background = '#fff7ed';
        banner.style.borderBottomColor = '#fb923c';
        banner.style.color = '#92400e';
      } else {
        banner.style.background = '#f0fdf4';
        banner.style.borderBottomColor = '#86efac';
        banner.style.color = '#166534';
      }
    }

    const dataScript = document.createElement('script');
    dataScript.id = '__MYTAFRIT_DATA__';
    dataScript.type = 'application/json';
    dataScript.textContent = JSON.stringify(payload);
    document.head.appendChild(dataScript);

    const menuRes = await fetch('menu.html');
    const menuHtml = await menuRes.text();
    const parser = new DOMParser();
    const menuDoc = parser.parseFromString(menuHtml, 'text/html');

    document.getElementById('previewLoading').style.display = 'none';

    const menuBody = menuDoc.body;
    const fragment = document.createDocumentFragment();
    Array.from(menuBody.children).forEach(child => {
      if (child.id !== 'menuError') {
        fragment.appendChild(child.cloneNode(true));
      }
    });
    document.body.appendChild(fragment);

    const menuScripts = menuDoc.querySelectorAll('script[type="module"]');
    menuScripts.forEach(scriptEl => {
      const newScript = document.createElement('script');
      newScript.type = 'module';
      newScript.textContent = scriptEl.textContent;
      document.body.appendChild(newScript);
    });

  } catch (e) {
    console.error('Preview load failed', e);
    showError('שגיאה בטעינה', 'לא הצלחנו לטעון את התצוגה המקדימה. נסה שוב.');
  }
}

function showError(title, msg) {
  document.getElementById('previewLoading').style.display = 'none';
  const errDiv = document.getElementById('previewError');
  errDiv.style.display = 'block';
  document.getElementById('previewErrorTitle').textContent = title;
  document.getElementById('previewErrorMsg').textContent = msg;
}

loadPreview();
</script>

</body>
</html>
